name: Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build, for example v1.0.0"
        required: true
        type: string

jobs:
  release:
    if: startsWith(inputs.tag_name, 'v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew clean shadowJar

      - name: Generate update manifest
        shell: bash
        run: |
          set -euo pipefail
          BUILD_ID="${GITHUB_SHA::10}"
          JAR_NAME="$(basename "$(find build/libs -maxdepth 1 -name '*.jar' -print -quit)")"
          cat > build/libs/update-manifest.json <<EOF
          {
            "buildId": "${BUILD_ID}",
            "downloadUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/${JAR_NAME}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nicdevportal-plugin
          path: |
            build/libs/*.jar
            build/libs/update-manifest.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.ref_name }}
          draft: true
          files: |
            build/libs/*.jar
            build/libs/update-manifest.json
