name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build, for example v1.0.0"
        required: true
        type: string

jobs:
  release:
    if: github.event_name == 'push' || startsWith(inputs.tag_name, 'v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew clean shadowJar

      - name: Generate update manifest
        shell: bash
        run: |
          set -euo pipefail
          BUILD_ID="${GITHUB_SHA::10}"
          cat > build/libs/update-manifest.json <<EOF
          {
            "buildId": "${BUILD_ID}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: nicdevportal-plugin
          path: |
            build/libs/*.jar
            build/libs/update-manifest.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          draft: true
          files: |
            build/libs/*.jar
            build/libs/update-manifest.json
